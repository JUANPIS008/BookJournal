name: CI/CD BookJournal

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Cache de Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Ver estructura real
        run: ls -R
        
      - name: Compilar y ejecutar pruebas
        run: mvn clean verify
        working-directory: ./backend

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build imagen backend
        run: |
          gcloud builds submit ./backend \
          --tag us-central1-docker.pkg.dev/bookjournal-493603/backend-repo/backend-book \
          --quiet

      - name: Deploy backend
        run: |
          gcloud run deploy backend-book \
          --image us-central1-docker.pkg.dev/bookjournal-493603/backend-repo/backend-book \
          --region southamerica-east1 \
          --platform managed \
          --allow-unauthenticated \
          --add-cloudsql-instances bookjournal-493603:southamerica-east1:bookjournal2 \
          --set-env-vars SPRING_DATASOURCE_URL="jdbc:postgresql:///bookjournal?socketFactory=com.google.cloud.sql.postgres.SocketFactory&cloudSqlInstance=bookjournal-493603:southamerica-east1:bookjournal2",SPRING_DATASOURCE_USERNAME=bookjournal2 \
          --set-secrets SPRING_DATASOURCE_PASSWORD=db-password:Bookjournal2026#

      - name: Deploy frontend
        run: |
          gsutil rsync -R ./frontend gs://frontendapi

